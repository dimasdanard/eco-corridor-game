<!DOCTYPE html>
<html>
<head>
<title>Urban Heat Mitigation Corridor Game</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#1b1b1b;
color:white;
}

canvas{
background:white;
border:2px solid black;
margin-top:10px;
}

button{
margin:5px;
padding:8px 15px;
font-size:14px;
}

#legend{
margin-top:10px;
}

.box{
display:inline-block;
width:20px;
height:20px;
margin-right:5px;
}

</style>
</head>

<body>

<h2>Urban Ecological Corridor Challenge</h2>

<p id="challenge"></p>

<button onclick="resetCorridor()">Reset Corridors</button>

<canvas id="map"></canvas>

<p id="stats"></p>

<div id="legend">

<h3>Legend</h3>

<div><span class="box" style="background:red"></span>Very Hot</div>
<div><span class="box" style="background:orange"></span>Hot</div>
<div><span class="box" style="background:yellow"></span>Moderate</div>
<div><span class="box" style="background:lightblue"></span>Cool</div>
<div><span class="box" style="background:black"></span>Heat Source</div>
<div><span class="box" style="background:green"></span>Cold Source</div>
<div><span class="box" style="background:gray"></span>Restricted Area</div>
<div><span class="box" style="background:lime"></span>Ecological Corridor</div>

</div>

<script>

const rows=20
const cols=20
const size=25
const baseTemp=28

const canvas=document.getElementById("map")
const ctx=canvas.getContext("2d")

canvas.width=cols*size
canvas.height=rows*size

let grid=[]
let heatSources=[]
let coldSources=[]
let corridor=[]
let restricted=[]

let drawing=false

let existingLST=0
let existingUHI=0

const challenge={
lstReduction:1.5,
uhiReduction:1.2,
budget:400
}

function initGrid(){

grid=[]
heatSources=[]
coldSources=[]
restricted=[]
corridor=[]

for(let r=0;r<rows;r++){

grid[r]=[]

for(let c=0;c<cols;c++){

let rand=Math.random()

if(rand<0.05){

grid[r][c]="heat"
heatSources.push({r,c})

}

else if(rand<0.1){

grid[r][c]="cold"
coldSources.push({r,c})

}

else if(rand<0.18){

grid[r][c]="restricted"
restricted.push({r,c})

}

else{

grid[r][c]="urban"

}

}

}

existingLST=calculateAverageTemp()
existingUHI=existingLST-baseTemp

updateChallenge()

}

function updateChallenge(){

document.getElementById("challenge").innerText=

"Challenge: Reduce LST ≥ "+challenge.lstReduction+
"°C | Reduce UHI ≥ "+challenge.uhiReduction+
"°C | Budget ≤ "+challenge.budget

}

function distance(a,b){

return Math.sqrt((a.r-b.r)**2+(a.c-b.c)**2)

}

function corridorCooling(r,c){

let cool=0

corridor.forEach(cell=>{

let d=distance(cell,{r,c})

if(d<2) cool+=0.8
else if(d<3) cool+=0.3

})

return cool

}

function cellTemp(r,c){

let t=baseTemp

heatSources.forEach(h=>{
let d=distance({r,c},h)
t+=6/(d+1)
})

coldSources.forEach(cl=>{
let d=distance({r,c},cl)
t-=5/(d+1)
})

t-=corridorCooling(r,c)

return t

}

function calculateAverageTemp(){

let total=0
let count=0

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

total+=cellTemp(r,c)
count++

}
}

return total/count

}

function draw(){

for(let r=0;r<rows;r++){

for(let c=0;c<cols;c++){

let t=cellTemp(r,c)

let color

if(t>34) color="red"
else if(t>32) color="orange"
else if(t>30) color="yellow"
else color="lightblue"

ctx.fillStyle=color
ctx.fillRect(c*size,r*size,size,size)
ctx.strokeRect(c*size,r*size,size,size)

if(grid[r][c]=="heat"){

ctx.fillStyle="black"
ctx.fillRect(c*size+8,r*size+8,10,10)

}

if(grid[r][c]=="cold"){

ctx.fillStyle="green"
ctx.fillRect(c*size+8,r*size+8,10,10)

}

if(grid[r][c]=="restricted"){

ctx.fillStyle="gray"
ctx.fillRect(c*size,r*size,size,size)

}

}

}

ctx.fillStyle="lime"

corridor.forEach(p=>{
ctx.fillRect(p.c*size,p.r*size,size,size)
})

updateStats()

}

canvas.addEventListener("mousedown",function(e){

drawing=true

let rect=canvas.getBoundingClientRect()

let c=Math.floor((e.clientX-rect.left)/size)
let r=Math.floor((e.clientY-rect.top)/size)

corridor.push({r,c})

})

canvas.addEventListener("mousemove",function(e){

if(!drawing) return

let rect=canvas.getBoundingClientRect()

let c=Math.floor((e.clientX-rect.left)/size)
let r=Math.floor((e.clientY-rect.top)/size)

if(r<0||c<0||r>=rows||c>=cols) return

if(grid[r][c]=="restricted") return

let last=corridor[corridor.length-1]

if(last.r!=r||last.c!=c){

corridor.push({r,c})
draw()

}

})

canvas.addEventListener("mouseup",function(){

drawing=false

})

function updateStats(){

let newLST=calculateAverageTemp()
let newUHI=newLST-baseTemp

let cost=corridor.length*12

let lstReduction=existingLST-newLST
let uhiReduction=existingUHI-newUHI

document.getElementById("stats").innerText=

"Existing LST: "+existingLST.toFixed(2)+"°C | "+
"New LST: "+newLST.toFixed(2)+"°C | "+
"LST Reduction: "+lstReduction.toFixed(2)+"°C | "+

"Existing UHI: "+existingUHI.toFixed(2)+"°C | "+
"New UHI: "+newUHI.toFixed(2)+"°C | "+
"UHI Reduction: "+uhiReduction.toFixed(2)+"°C | "+

"Cost: "+cost

checkChallenge(lstReduction,uhiReduction,cost)

}

function checkChallenge(lstRed,uhiRed,cost){

if(lstRed>=challenge.lstReduction &&
uhiRed>=challenge.uhiReduction &&
cost<=challenge.budget){

document.getElementById("stats").innerText +=
" | Challenge Completed!"

}

}

function resetCorridor(){

corridor=[]
draw()

}

initGrid()
draw()

</script>

</body>
</html>

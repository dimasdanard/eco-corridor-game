<!DOCTYPE html>
<html>
<head>
<title>UHI Corridor Simulator</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#1e1e1e;
color:white;
}

canvas{
background:white;
border:2px solid black;
}

</style>

</head>

<body>

<h2>Urban Heat Island Corridor Simulator</h2>
<p>Klik grid untuk membuat ecological corridor</p>

<canvas id="map"></canvas>

<p id="stats"></p>

<script>

const rows = 20
const cols = 20
const size = 25

const baseTemp = 28

const canvas = document.getElementById("map")
const ctx = canvas.getContext("2d")

canvas.width = cols*size
canvas.height = rows*size

let grid=[]
let corridor=[]
let heatSources=[]
let coldSources=[]

function initGrid(){

for(let r=0;r<rows;r++){

grid[r]=[]

for(let c=0;c<cols;c++){

let rand=Math.random()

if(rand<0.05){

grid[r][c]="heat"
heatSources.push({r,c})

}

else if(rand<0.1){

grid[r][c]="cold"
coldSources.push({r,c})

}

else{

grid[r][c]="urban"

}

}

}

}

function distance(a,b){

return Math.sqrt((a.r-b.r)**2+(a.c-b.c)**2)

}

function cellTemperature(r,c){

let temp=baseTemp

heatSources.forEach(h=>{

let d=distance({r,c},h)
temp+=6/(d+1)

})

coldSources.forEach(cl=>{

let d=distance({r,c},cl)
temp-=5/(d+1)

})

corridor.forEach(cr=>{

if(cr.r==r && cr.c==c)
temp-=0.5

})

return temp

}

function draw(){

for(let r=0;r<rows;r++){

for(let c=0;c<cols;c++){

let t=cellTemperature(r,c)

let color

if(t>34) color="red"
else if(t>32) color="orange"
else if(t>30) color="yellow"
else color="lightblue"

ctx.fillStyle=color
ctx.fillRect(c*size,r*size,size,size)
ctx.strokeRect(c*size,r*size,size,size)

if(grid[r][c]=="heat"){

ctx.fillStyle="black"
ctx.fillRect(c*size+8,r*size+8,8,8)

}

if(grid[r][c]=="cold"){

ctx.fillStyle="green"
ctx.fillRect(c*size+8,r*size+8,8,8)

}

}

}

ctx.fillStyle="lime"

corridor.forEach(p=>{

ctx.fillRect(p.c*size,p.r*size,size,size)

})

updateStats()

}

canvas.addEventListener("click",function(e){

let rect=canvas.getBoundingClientRect()

let c=Math.floor((e.clientX-rect.left)/size)
let r=Math.floor((e.clientY-rect.top)/size)

corridor.push({r,c})

draw()

})

function updateStats(){

let totalTemp=0
let count=0

for(let r=0;r<rows;r++){

for(let c=0;c<cols;c++){

totalTemp+=cellTemperature(r,c)
count++

}

}

let avg=(totalTemp/count)

let uhi=avg-baseTemp

let cost=corridor.length*10

document.getElementById("stats").innerText=

"Average Temp: "+avg.toFixed(2)+"°C | UHI: "+uhi.toFixed(2)+"°C | Corridor Cost: "+cost

}

initGrid()
draw()

</script>

</body>
</html>

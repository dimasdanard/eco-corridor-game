<!DOCTYPE html>
<html>
<head>
<title>Urban Ecological Corridor Planner</title>

<style>

body{
font-family:Arial;
background:#1b1b1b;
color:white;
}

.container{
display:flex;
justify-content:center;
margin-top:20px;
}

canvas{
background:white;
border:2px solid black;
cursor:pointer;
}

.sidepanel{
margin-left:25px;
text-align:left;
width:250px;
}

.box{
width:18px;
height:18px;
display:inline-block;
margin-right:8px;
}

button{
padding:6px 10px;
margin:3px;
}

.layer{
background:#2b2b2b;
padding:5px;
margin-top:5px;
}

</style>
</head>

<body>

<h2 style="text-align:center">Urban Ecological Corridor Challenge</h2>

<div class="container">

<canvas id="map"></canvas>

<div class="sidepanel">

<h3>Legend</h3>

<div><span class="box" style="background:red"></span>Very Hot</div>
<div><span class="box" style="background:orange"></span>Hot</div>
<div><span class="box" style="background:yellow"></span>Moderate</div>
<div><span class="box" style="background:lightblue"></span>Cool</div>
<div><span class="box" style="background:black"></span>Heat Source</div>
<div><span class="box" style="background:green"></span>Cold Source</div>
<div><span class="box" style="background:gray"></span>Restricted Area</div>
<div><span class="box" style="background:lime"></span>Corridor</div>

<br>

<button onclick="resetCorridors()">Reset</button>
<button onclick="evaluatePlan()">PLAN</button>

<h3>Corridor Layers</h3>
<div id="layers"></div>

<p id="challenge"></p>
<p id="stats"></p>

</div>

</div>

<script>

const rows=20
const cols=20
const size=25
const baseTemp=28

const canvas=document.getElementById("map")
const ctx=canvas.getContext("2d")

canvas.width=cols*size
canvas.height=rows*size

let grid=[]
let heatSources=[]
let coldSources=[]
let restricted=[]

let corridors=[]
let currentCorridor=[]

let existingLST=0
let existingUHI=0

let level=1

const levels=[
{lstReduction:0.8,uhiReduction:0.6,budget:400},
{lstReduction:1.5,uhiReduction:1.2,budget:350},
{lstReduction:2.5,uhiReduction:2.0,budget:320}
]

function getMouseCell(e){

const rect=canvas.getBoundingClientRect()

const scaleX=canvas.width/rect.width
const scaleY=canvas.height/rect.height

const x=(e.clientX-rect.left)*scaleX
const y=(e.clientY-rect.top)*scaleY

const c=Math.floor(x/size)
const r=Math.floor(y/size)

return {r,c}

}

function initGrid(){

grid=[]
heatSources=[]
coldSources=[]
restricted=[]
corridors=[]
currentCorridor=[]

for(let r=0;r<rows;r++){

grid[r]=[]

for(let c=0;c<cols;c++){

let rand=Math.random()

if(rand<0.05){

grid[r][c]="heat"
heatSources.push({r,c})

}

else if(rand<0.1){

grid[r][c]="cold"
coldSources.push({r,c})

}

else if(rand<0.18){

grid[r][c]="restricted"

}

else{

grid[r][c]="urban"

}

}

}

existingLST=calculateAverageTemp()
existingUHI=existingLST-baseTemp

updateChallenge()
updateLayers()

}

function updateChallenge(){

let ch=levels[level-1]

document.getElementById("challenge").innerText=

"LEVEL "+level+
"\nReduce LST ≥ "+ch.lstReduction+
"\nReduce UHI ≥ "+ch.uhiReduction+
"\nBudget ≤ "+ch.budget

}

function corridorCooling(r,c){

let cool=0

corridors.forEach(line=>{

line.forEach(cell=>{

let d=Math.sqrt((cell.r-r)**2+(cell.c-c)**2)

if(d<2) cool+=0.8
else if(d<3) cool+=0.3

})

})

return cool

}

function cellTemp(r,c){

let t=baseTemp

heatSources.forEach(h=>{
let d=Math.sqrt((h.r-r)**2+(h.c-c)**2)
t+=6/(d+1)
})

coldSources.forEach(cl=>{
let d=Math.sqrt((cl.r-r)**2+(cl.c-c)**2)
t-=5/(d+1)
})

t-=corridorCooling(r,c)

return t

}

function calculateAverageTemp(){

let total=0
let count=0

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

total+=cellTemp(r,c)
count++

}
}

return total/count

}

function draw(){

for(let r=0;r<rows;r++){

for(let c=0;c<cols;c++){

let t=cellTemp(r,c)

let color

if(t>34) color="red"
else if(t>32) color="orange"
else if(t>30) color="yellow"
else color="lightblue"

ctx.fillStyle=color
ctx.fillRect(c*size,r*size,size,size)
ctx.strokeRect(c*size,r*size,size,size)

if(grid[r][c]=="heat"){

ctx.fillStyle="black"
ctx.fillRect(c*size+8,r*size+8,10,10)

}

if(grid[r][c]=="cold"){

ctx.fillStyle="green"
ctx.fillRect(c*size+8,r*size+8,10,10)

}

if(grid[r][c]=="restricted"){

ctx.fillStyle="gray"
ctx.fillRect(c*size,r*size,size,size)

}

}

}

ctx.fillStyle="lime"

corridors.forEach(line=>{
line.forEach(cell=>{
ctx.fillRect(cell.c*size,cell.r*size,size,size)
})
})

ctx.fillStyle="cyan"

currentCorridor.forEach(cell=>{
ctx.fillRect(cell.c*size,cell.r*size,size,size)
})

updateStats()

}

canvas.addEventListener("click",function(e){

let {r,c}=getMouseCell(e)

if(grid[r][c]=="restricted") return

currentCorridor.push({r,c})

draw()

})

canvas.addEventListener("dblclick",function(){

if(currentCorridor.length<2){

currentCorridor=[]
draw()
return

}

if(confirm("Finish this corridor?")){

corridors.push([...currentCorridor])

}

currentCorridor=[]

updateLayers()

draw()

})

function updateLayers(){

let panel=document.getElementById("layers")

panel.innerHTML=""

corridors.forEach((c,i)=>{

let div=document.createElement("div")
div.className="layer"

div.innerHTML="Corridor "+(i+1)+
" <button onclick='deleteCorridor("+i+")'>Delete</button>"

panel.appendChild(div)

})

}

function deleteCorridor(i){

corridors.splice(i,1)

updateLayers()

draw()

}

function resetCorridors(){

corridors=[]
currentCorridor=[]
updateLayers()
draw()

}

function updateStats(){

let newLST=calculateAverageTemp()
let newUHI=newLST-baseTemp

let totalCells=0

corridors.forEach(line=>{
totalCells+=line.length
})

let cost=totalCells*12

document.getElementById("stats").innerText=

"Existing LST: "+existingLST.toFixed(2)+"\n"+
"New LST: "+newLST.toFixed(2)+"\n"+
"LST Reduction: "+(existingLST-newLST).toFixed(2)+"\n\n"+

"Existing UHI: "+existingUHI.toFixed(2)+"\n"+
"New UHI: "+newUHI.toFixed(2)+"\n"+
"UHI Reduction: "+(existingUHI-newUHI).toFixed(2)+"\n\n"+

"Cost: "+cost

}

function evaluatePlan(){

let newLST=calculateAverageTemp()
let newUHI=newLST-baseTemp

let lstReduction=existingLST-newLST
let uhiReduction=existingUHI-newUHI

let totalCells=0

corridors.forEach(line=>{
totalCells+=line.length
})

let cost=totalCells*12

let ch=levels[level-1]

if(cost>ch.budget){

alert("Budget exceeded")
return

}

if(lstReduction<ch.lstReduction || uhiReduction<ch.uhiReduction){

alert("Cooling impact insufficient")
return

}

alert("Level Completed!")

level++

if(level>levels.length){

alert("All levels completed!")

}else{

initGrid()
draw()

}

}

initGrid()
draw()

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Urban Ecological Corridor Planner</title>

<style>

body{
font-family:Segoe UI,Arial;
background:#121212;
color:white;
margin:0;
}

.wrapper{
display:flex;
justify-content:center;
align-items:flex-start;
margin-top:20px;
}

.panel{
background:#1f1f1f;
padding:15px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.leftpanel{
width:220px;
margin-right:20px;
}

.rightpanel{
width:260px;
margin-left:20px;
}

canvas{
background:#111;
border-radius:8px;
border:2px solid #333;
}

.box{
width:16px;
height:16px;
display:inline-block;
margin-right:8px;
}

button{
background:#3a86ff;
border:none;
padding:7px 12px;
margin:4px;
border-radius:4px;
color:white;
cursor:pointer;
}

button:hover{
background:#5aa0ff;
}

.layer{
background:#2a2a2a;
padding:6px;
margin-top:4px;
border-radius:4px;
}

h3{
margin-top:5px;
}

</style>
</head>

<body>

<h2 style="text-align:center">Urban Ecological Corridor Challenge</h2>

<div class="wrapper">

<div class="panel leftpanel">

<h3>Guide</h3>

Create corridor:<br>
Click cells to draw path.<br>
Double-click to finish.

<br><br>

Delete corridor:<br>
Use Delete button.

<br><br>

Press PLAN to test strategy.

</div>


<canvas id="map" width="500" height="500"></canvas>


<div class="panel rightpanel">

<h3>Legend</h3>

<div><span class="box" style="background:#ff3b3b"></span>Very Hot</div>
<div><span class="box" style="background:#ff8c00"></span>Hot</div>
<div><span class="box" style="background:#ffd500"></span>Moderate</div>
<div><span class="box" style="background:#3ec1ff"></span>Cool</div>
<div><span class="box" style="background:black"></span>Heat Source</div>
<div><span class="box" style="background:#00ff7f"></span>Cold Source</div>
<div><span class="box" style="background:gray"></span>Restricted</div>

<br>

<button onclick="resetCorridors()">Reset</button>
<button onclick="evaluatePlan()">PLAN</button>

<h3>Corridor Layers</h3>
<div id="layers"></div>

<p id="stats"></p>

</div>

</div>

<script>

const rows=20
const cols=20
const cell=25
const baseTemp=28

const canvas=document.getElementById("map")
const ctx=canvas.getContext("2d")

let grid=[]
let heatSources=[]
let coldSources=[]
let restricted=[]

let corridors=[]
let current=[]

function getCell(e){

const rect=canvas.getBoundingClientRect()

const x=e.clientX-rect.left
const y=e.clientY-rect.top

return{
r:Math.floor(y/cell),
c:Math.floor(x/cell)
}

}

function initGrid(){

grid=[]
heatSources=[]
coldSources=[]
restricted=[]
corridors=[]
current=[]

for(let r=0;r<rows;r++){

grid[r]=[]

for(let c=0;c<cols;c++){

let rand=Math.random()

if(rand<0.05){

grid[r][c]="heat"
heatSources.push({r,c})

}

else if(rand<0.1){

grid[r][c]="cold"
coldSources.push({r,c})

}

else if(rand<0.18){

grid[r][c]="restricted"

}

else{

grid[r][c]="urban"

}

}

}

draw()

}

function tempColor(t){

if(t>34) return "#ff3b3b"
if(t>32) return "#ff8c00"
if(t>30) return "#ffd500"
return "#3ec1ff"

}

function cellTemp(r,c){

let t=baseTemp

heatSources.forEach(h=>{

let d=Math.sqrt((h.r-r)**2+(h.c-c)**2)
t+=6/(d+1)

})

coldSources.forEach(cl=>{

let d=Math.sqrt((cl.r-r)**2+(cl.c-c)**2)
t-=5/(d+1)

})

return t

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let r=0;r<rows;r++){

for(let c=0;c<cols;c++){

let t=cellTemp(r,c)

ctx.fillStyle=tempColor(t)
ctx.fillRect(c*cell,r*cell,cell,cell)

ctx.strokeStyle="rgba(255,255,255,0.08)"
ctx.strokeRect(c*cell,r*cell,cell,cell)

if(grid[r][c]=="heat"){

ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(c*cell+12,r*cell+12,5,0,6.28)
ctx.fill()

}

if(grid[r][c]=="cold"){

ctx.fillStyle="#00ff7f"
ctx.beginPath()
ctx.arc(c*cell+12,r*cell+12,5,0,6.28)
ctx.fill()

}

if(grid[r][c]=="restricted"){

ctx.fillStyle="gray"
ctx.fillRect(c*cell,r*cell,cell,cell)

}

}

}

drawCorridors()

}

function drawCorridors(){

ctx.lineWidth=4
ctx.lineCap="round"

corridors.forEach(line=>{

ctx.beginPath()

line.forEach((p,i)=>{

let x=p.c*cell+12
let y=p.r*cell+12

if(i==0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)

})

ctx.strokeStyle="#00ff7f"
ctx.stroke()

})

}

canvas.addEventListener("click",function(e){

let {r,c}=getCell(e)

if(grid[r][c]=="restricted") return

current.push({r,c})

draw()

ctx.beginPath()

current.forEach((p,i)=>{

let x=p.c*cell+12
let y=p.r*cell+12

if(i==0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)

})

ctx.strokeStyle="#00ffff"
ctx.lineWidth=3
ctx.stroke()

})

canvas.addEventListener("dblclick",function(){

if(current.length<2){

current=[]
draw()
return

}

if(confirm("Finish corridor?")){

corridors.push([...current])

}

current=[]

draw()
updateLayers()

})

function updateLayers(){

let div=document.getElementById("layers")
div.innerHTML=""

corridors.forEach((c,i)=>{

let d=document.createElement("div")
d.className="layer"

d.innerHTML="Corridor "+(i+1)+" <button onclick='deleteCorridor("+i+")'>Delete</button>"

div.appendChild(d)

})

}

function deleteCorridor(i){

corridors.splice(i,1)
updateLayers()
draw()

}

function resetCorridors(){

corridors=[]
current=[]
updateLayers()
draw()

}

function evaluatePlan(){

alert("Plan evaluation coming next stage")

}

initGrid()

</script>

</body>
</html>

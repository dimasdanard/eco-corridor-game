<!DOCTYPE html>
<html>
<head>
<title>Urban Ecological Corridor Planner</title>

<style>

body{
font-family:Arial;
background:#1b1b1b;
color:white;
}

.container{
display:flex;
justify-content:center;
margin-top:20px;
}

canvas{
background:white;
border:2px solid black;
}

.sidepanel{
margin-left:25px;
text-align:left;
width:220px;
}

.box{
width:18px;
height:18px;
display:inline-block;
margin-right:8px;
}

button{
padding:8px 14px;
margin:4px;
font-size:14px;
}

</style>
</head>

<body>

<h2 style="text-align:center">Urban Ecological Corridor Challenge</h2>

<div class="container">

<canvas id="map"></canvas>

<div class="sidepanel">

<h3>Legend</h3>

<div><span class="box" style="background:red"></span>Very Hot</div>
<div><span class="box" style="background:orange"></span>Hot</div>
<div><span class="box" style="background:yellow"></span>Moderate</div>
<div><span class="box" style="background:lightblue"></span>Cool</div>
<div><span class="box" style="background:black"></span>Heat Source</div>
<div><span class="box" style="background:green"></span>Cold Source</div>
<div><span class="box" style="background:gray"></span>Restricted Area</div>
<div><span class="box" style="background:lime"></span>Corridor</div>

<br>

<button onclick="evaluatePlan()">PLAN</button>

<p id="challenge"></p>

<p id="stats"></p>

</div>

</div>

<script>

const rows=20
const cols=20
const size=25
const baseTemp=28

const canvas=document.getElementById("map")
const ctx=canvas.getContext("2d")

canvas.width=cols*size
canvas.height=rows*size

let grid=[]
let heatSources=[]
let coldSources=[]
let restricted=[]

let corridors=[]

let startSource=null

let existingLST=0
let existingUHI=0

let level=1

const levels=[
{lstReduction:0.8,uhiReduction:0.6,budget:400},
{lstReduction:1.5,uhiReduction:1.2,budget:350},
{lstReduction:2.5,uhiReduction:2.0,budget:320}
]

function initGrid(){

grid=[]
heatSources=[]
coldSources=[]
restricted=[]
corridors=[]

for(let r=0;r<rows;r++){

grid[r]=[]

for(let c=0;c<cols;c++){

let rand=Math.random()

if(rand<0.05){

grid[r][c]="heat"
heatSources.push({r,c})

}

else if(rand<0.1){

grid[r][c]="cold"
coldSources.push({r,c})

}

else if(rand<0.18){

grid[r][c]="restricted"
restricted.push({r,c})

}

else{

grid[r][c]="urban"

}

}

}

existingLST=calculateAverageTemp()
existingUHI=existingLST-baseTemp

updateChallenge()

}

function updateChallenge(){

let ch=levels[level-1]

document.getElementById("challenge").innerText=

"LEVEL "+level+
"\nReduce LST ≥ "+ch.lstReduction+"°C"+
"\nReduce UHI ≥ "+ch.uhiReduction+"°C"+
"\nBudget ≤ "+ch.budget

}

function distance(a,b){

return Math.sqrt((a.r-b.r)**2+(a.c-b.c)**2)

}

function corridorCooling(r,c){

let cool=0

corridors.forEach(line=>{

line.forEach(cell=>{

let d=distance(cell,{r,c})

if(d<2) cool+=0.8
else if(d<3) cool+=0.3

})

})

return cool

}

function cellTemp(r,c){

let t=baseTemp

heatSources.forEach(h=>{
let d=distance({r,c},h)
t+=6/(d+1)
})

coldSources.forEach(cl=>{
let d=distance({r,c},cl)
t-=5/(d+1)
})

t-=corridorCooling(r,c)

return t

}

function calculateAverageTemp(){

let total=0
let count=0

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

total+=cellTemp(r,c)
count++

}
}

return total/count

}

function draw(){

for(let r=0;r<rows;r++){

for(let c=0;c<cols;c++){

let t=cellTemp(r,c)

let color

if(t>34) color="red"
else if(t>32) color="orange"
else if(t>30) color="yellow"
else color="lightblue"

ctx.fillStyle=color
ctx.fillRect(c*size,r*size,size,size)
ctx.strokeRect(c*size,r*size,size,size)

if(grid[r][c]=="heat"){

ctx.fillStyle="black"
ctx.fillRect(c*size+8,r*size+8,10,10)

}

if(grid[r][c]=="cold"){

ctx.fillStyle="green"
ctx.fillRect(c*size+8,r*size+8,10,10)

}

if(grid[r][c]=="restricted"){

ctx.fillStyle="gray"
ctx.fillRect(c*size,r*size,size,size)

}

}

}

ctx.fillStyle="lime"

corridors.forEach(line=>{
line.forEach(cell=>{
ctx.fillRect(cell.c*size,cell.r*size,size,size)
})
})

updateStats()

}

canvas.addEventListener("click",function(e){

let rect=canvas.getBoundingClientRect()

let c=Math.floor((e.clientX-rect.left)/size)
let r=Math.floor((e.clientY-rect.top)/size)

if(grid[r][c]=="heat" || grid[r][c]=="cold"){

if(startSource==null){

startSource={r,c}

}else{

createCorridor(startSource,{r,c})

startSource=null

}

}

else{

removeCorridor(r,c)

}

})

function createCorridor(a,b){

if(corridors.length>=3){

alert("Maximum 3 corridors allowed")
return

}

let cells=[]

let dx=b.c-a.c
let dy=b.r-a.r

let steps=Math.max(Math.abs(dx),Math.abs(dy))

for(let i=0;i<=steps;i++){

let r=Math.round(a.r + dy*i/steps)
let c=Math.round(a.c + dx*i/steps)

if(grid[r][c]=="restricted"){

alert("Invalid corridor: blocked by restricted area")
return

}

cells.push({r,c})

}

corridors.push(cells)

draw()

}

function removeCorridor(r,c){

for(let i=0;i<corridors.length;i++){

for(let cell of corridors[i]){

if(cell.r==r && cell.c==c){

corridors.splice(i,1)
draw()
return

}

}

}

}

function updateStats(){

let newLST=calculateAverageTemp()
let newUHI=newLST-baseTemp

let totalCells=0

corridors.forEach(line=>{
totalCells+=line.length
})

let cost=totalCells*12

document.getElementById("stats").innerText=

"Existing LST: "+existingLST.toFixed(2)+"°C\n"+
"New LST: "+newLST.toFixed(2)+"°C\n"+
"LST Reduction: "+(existingLST-newLST).toFixed(2)+"°C\n\n"+

"Existing UHI: "+existingUHI.toFixed(2)+"°C\n"+
"New UHI: "+newUHI.toFixed(2)+"°C\n"+
"UHI Reduction: "+(existingUHI-newUHI).toFixed(2)+"°C\n\n"+

"Cost: "+cost

}

function evaluatePlan(){

let newLST=calculateAverageTemp()
let newUHI=newLST-baseTemp

let lstReduction=existingLST-newLST
let uhiReduction=existingUHI-newUHI

let totalCells=0

corridors.forEach(line=>{
totalCells+=line.length
})

let cost=totalCells*12

let ch=levels[level-1]

if(cost>ch.budget){

alert("Plan rejected: budget exceeded")
return

}

if(lstReduction<ch.lstReduction || uhiReduction<ch.uhiReduction){

alert("Plan insufficient: cooling impact too low")
return

}

alert("Level Completed!")

level++

if(level>levels.length){

alert("All levels completed!")

}else{

initGrid()
draw()

}

}

initGrid()
draw()

</script>

</body>
</html>
